spring.application.name=trollo

# 🌟 Active Profile (default is 'local')
# 운영 배포 시에는 OS 환경변수 SPRING_PROFILES_ACTIVE=prod 로 overriding 됩니다.
spring.profiles.active=${SPRING_PROFILES_ACTIVE:local}

# 🌟 JWT (공통)
jwt.secret=${JWT_SECRET:change-this-secret-key-at-least-32chars}
jwt.expiration-millis=${JWT_EXPIRATION_MILLIS:3600000}
