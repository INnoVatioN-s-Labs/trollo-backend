name: Trollo Backend CD

on:
    push:
        branches: ['main']

env:
    DOCKER_IMAGE_NAME: trollo-backend

jobs:
    build_and_deploy:
        runs-on: ubuntu-latest
        permissions:
            contents: read
            packages: write

        steps:
            - name: Checkout Code
              uses: actions/checkout@v3

            - name: Log in to GitHub Container Registry (GHCR)
              uses: docker/login-action@v2
              with:
                  registry: ghcr.io
                  username: ${{ github.actor }}
                  password: ${{ secrets.GITHUB_TOKEN }}

            - name: Build and Push Docker Image
              uses: docker/build-push-action@v3
              with:
                  context: .
                  push: true
                  tags: |
                      ghcr.io/${{ github.repository }}/${{ env.DOCKER_IMAGE_NAME }}:latest
                      ghcr.io/${{ github.repository }}/${{ env.DOCKER_IMAGE_NAME }}:${{ github.sha }}

            - name: Deploy to Oracle Cloud Instance via SSH
              uses: appleboy/ssh-action@v0.1.10
              with:
                  host: ${{ secrets.ORACLE_HOST }}
                  username: ${{ secrets.ORACLE_USERNAME }}
                  key: ${{ secrets.ORACLE_SSH_KEY }}
                  script: |
                      # 1. Login to GHCR on the server
                      echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin

                      # 2. Pull the latest image
                      docker pull ghcr.io/${{ github.repository }}/${{ env.DOCKER_IMAGE_NAME }}:latest

                      # 3. Stop and remove the existing container (if any)
                      docker stop trollo-backend || true
                      docker rm trollo-backend || true

                      # 4. Run the new container, passing secrets as environment variables
                      # 8080 포트를 호스트에 바인딩
                      docker run -d \
                        --name trollo-backend \
                        -p 8080:8080 \
                        -e SPRING_PROFILES_ACTIVE=prod \
                        -e DB_URL="${{ secrets.DB_URL }}" \
                        -e DB_USERNAME="${{ secrets.DB_USERNAME }}" \
                        -e DB_PASSWORD="${{ secrets.DB_PASSWORD }}" \
                        -e JWT_SECRET="${{ secrets.JWT_SECRET }}" \
                        ghcr.io/${{ github.repository }}/${{ env.DOCKER_IMAGE_NAME }}:latest
                        
                      # 5. Clean up dangling images to save disk space
                      docker image prune -f
